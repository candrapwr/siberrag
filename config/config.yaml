# ============================================================
# SiberRAG Configuration
# ============================================================
# Semua parameter pipeline dapat diubah dari file ini.
# CLI akan membaca konfigurasi ini secara otomatis.

# ---- Parsing ----
parsing:
  parser: "auto"              # "auto" | "docling" | "native"
  enable_ocr: false           # aktifkan OCR untuk PDF scan (memerlukan docling/ocr deps)
  ocr_language: ["en", "id"]  # bahasa OCR
  keep_images: false          # simpan referensi image (caption tetap di-keep)

# ---- Cleaning ----
cleaning:
  remove_repeated_headers: true
  remove_repeated_footers: true
  remove_page_numbers: true
  collapse_whitespace: true
  collapse_blank_lines: true
  fix_broken_ocr: true
  fix_invalid_unicode: true

# ---- Chunking ----
chunking:
  target_tokens: 500          # target ideal 450-550
  min_tokens: 250
  max_tokens: 700
  overlap_tokens: 90          # 80-100 token
  encoding: "cl100k_base"     # tiktoken encoding
  split_on_paragraph: true    # hanya split di batas paragraf bila perlu
  respect_heading_boundary: true  # heading SELALU mulai chunk baru (cegah campur lintas-bab)
  prepend_context: true       # tambahkan header [Chapter > Section] ke teks chunk (bantu retrieval)

# ---- Validation ----
validation:
  enabled: true
  min_quality_score: 70       # 0-100; chunk di bawah ini diberi warning keras
  flag_duplicate: true
  flag_oversized: true
  flag_undersized: true

# ---- Metadata ----
metadata:
  detect_language: true       # gunakan langdetect bila ada, fallback heuristik

# ---- Export ----
export:
  format: "jsonl"             # "json" | "jsonl" | "markdown"
  output_dir: "./output"
  pretty_json: true
  include_metadata: true
  overwrite: true

# ============================================================
# v2 - RAG (Embedding / Vector DB / LLM / Retrieval)
# ============================================================

# ---- Embedding (hybrid: local default, bisa switch ke API) ----
# Provider:
#   local  -> sentence-transformers (BGE-m3), gratis & offline
#   openai -> OpenAI resmi (text-embedding-3-small/large)
#   custom -> endpoint OpenAI-compatible APA SAJA (Jina/Cohere/Together/Ollama/LM Studio/dll)
embedding:
  provider: "custom"           # "local" | "openai" | "custom"
  model: "BAAI/bge-m3"        # model embedding DeepInfra
  dim: 1024                   # BGE-m3=1024
  batch_size: 32
  api_key: ""                 # ambil dari env OPENAI_API_KEY (JANGAN taruh key di sini)
  api_base: "https://api.deepinfra.com/v1"  # endpoint DeepInfra

# ---- Vector Database ----
vector_db:
  backend: "chroma"           # hanya ChromaDB (embedded, simpan ke disk)
  collection: "siberrag"      # nama collection
  path: "./vectorstore"       # direktori persisten ChromaDB
  distance: "cosine"

# ---- LLM (OpenAI-compatible API) ----
llm:
  provider: "openai"          # "openai" (pakai OpenAI-compatible endpoint apa saja)
  model: "meta-llama/Meta-Llama-3-8B-Instruct"   # sesuaikan dgn model di provider DeepInfra
  api_key: ""                 # ambil dari env OPENAI_API_KEY (JANGAN taruh key di sini)
  api_base: "https://api.deepinfra.com/v1"       # endpoint DeepInfra
  temperature: 0.3
  max_tokens: 1024

# ---- Retrieval & RAG flow ----
retrieval:
  top_k: 5                    # jumlah chunk relevan yang di-retrieve
  score_threshold: 0.3        # filter chunk dengan relevansi < threshold
  filter_by_document: false   # scope query ke document_id tertentu

